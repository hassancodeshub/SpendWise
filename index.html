<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise Student Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-overlay" class="login-overlay active">
        <div class="card login-card">
            <div class="logo-icon" style="justify-content: center; margin-bottom: 16px; transform: scale(1.5);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <h2 id="login-title" style="text-align: center; margin-bottom: 24px;">Welcome to SpendWise</h2>
            <p id="login-subtitle" style="text-align: center; color: var(--text-muted); margin-bottom: 24px; font-size: 0.85rem;">Local Privacy Lock</p>
            
            <form id="setup-form" class="hidden">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="setup-name" required>
                </div>
                <div class="form-group">
                    <label>Initial Monthly Budget</label>
                    <input type="number" id="setup-budget" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Create a 4-Digit PIN</label>
                    <input type="password" id="setup-pin" pattern="[0-9]{4}" maxlength="4" required placeholder="1234">
                </div>
                <div class="form-group">
                    <label>Confirm PIN</label>
                    <input type="password" id="setup-pin-confirm" pattern="[0-9]{4}" maxlength="4" required placeholder="1234">
                </div>
                <button type="submit" class="btn btn-primary w-100">Setup Dashboard</button>
            </form>

            <form id="auth-form">
                <div class="form-group">
                    <label>Enter your PIN</label>
                    <input type="password" id="auth-pin" pattern="[0-9]{4}" maxlength="4" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Unlock App</button>
            </form>
        </div>
    </div>
   </body>
   </html>
